<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#e9eef7"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fd"/>
    </linearGradient>
    <linearGradient id="decision" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="100%" stop-color="#ffe5a3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#90a0b8" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f647d"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #203047; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #4f647d; }
      .boxtitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #1f3148; }
      .boxtext { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #3d4f66; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #5c6e84; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #6e5a18; }
      .result { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #1f3148; }
      .box { fill: url(#box); stroke: #b9c7d8; stroke-width: 2; filter: url(#shadow); }
      .decision { fill: url(#decision); stroke: #d8ba55; stroke-width: 2; filter: url(#shadow); }
      .line { stroke: #4f647d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .branch { stroke: #7e91a8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="1120" fill="url(#bg)"/>

  <text x="700" y="62" text-anchor="middle" class="title">Pipeline Hibrido LLM + ESBMC para Codigo Python</text>
  <text x="700" y="95" text-anchor="middle" class="subtitle">Deteccao heuristica, formalizacao parcial e validacao formal de bugs e problemas de qualidade</text>

  <rect class="box" x="445" y="130" rx="20" ry="20" width="510" height="88"/>
  <text x="700" y="165" text-anchor="middle" class="boxtitle">1. Entrada</text>
  <text x="700" y="192" text-anchor="middle" class="boxtext">Arquivo, modulo, funcao ou metodo Python</text>

  <path class="line" d="M 700 218 L 700 260"/>

  <rect class="box" x="335" y="260" rx="20" ry="20" width="730" height="126"/>
  <text x="700" y="295" text-anchor="middle" class="boxtitle">2. Pre-processamento Estrutural</text>
  <text x="365" y="325" class="boxtext">- Segmentacao em unidades analisaveis</text>
  <text x="365" y="350" class="boxtext">- Extracao de assinatura, parametros, tipos, loops, condicionais e asserts</text>
  <text x="365" y="375" class="boxtext">- Identificacao de operacoes criticas: acesso indexado, divisao e chamadas</text>

  <path class="line" d="M 700 386 L 700 432"/>

  <rect class="box" x="305" y="432" rx="20" ry="20" width="790" height="126"/>
  <text x="700" y="467" text-anchor="middle" class="boxtitle">3. Analise Heuristica por LLM</text>
  <text x="335" y="497" class="boxtext">- Detecta smells, bugs suspeitos e vulnerabilidades suspeitas</text>
  <text x="335" y="522" class="boxtext">- Explica tecnicamente cada achado em linguagem natural</text>
  <text x="335" y="547" class="boxtext">- Indica o que parece formalizavel e o que deve ficar apenas como heuristica</text>

  <path class="line" d="M 700 558 L 700 610"/>

  <polygon class="decision" points="700,610 860,690 700,770 540,690"/>
  <text x="700" y="684" text-anchor="middle" class="boxtitle">4. Classificacao Inicial</text>
  <text x="700" y="708" text-anchor="middle" class="boxtext">Achado e verificavel formalmente?</text>

  <path class="branch" d="M 540 690 L 250 690 L 250 835"/>
  <text x="315" y="675" class="label">Nao</text>

  <rect class="box" x="70" y="835" rx="20" ry="20" width="360" height="150"/>
  <text x="250" y="870" text-anchor="middle" class="boxtitle">5A. Trilha Heuristica</text>
  <text x="100" y="900" class="boxtext">- Mantem o achado como smell ou risco heuristico</text>
  <text x="100" y="925" class="boxtext">- Preserva a justificativa do LLM para o desenvolvedor</text>
  <text x="100" y="950" class="boxtext">- Nao envia diretamente ao ESBMC</text>

  <path class="branch" d="M 860 690 L 1145 690 L 1145 835"/>
  <text x="1075" y="675" class="label">Sim</text>

  <rect class="box" x="965" y="835" rx="20" ry="20" width="360" height="150"/>
  <text x="1145" y="870" text-anchor="middle" class="boxtitle">5B. Formalizacao Parcial</text>
  <text x="995" y="900" class="boxtext">- Traduz a suspeita em propriedade formal local</text>
  <text x="995" y="925" class="boxtext">- Gera assert e assumptions candidatas</text>
  <text x="995" y="950" class="boxtext">- Define o ponto de instrumentacao no codigo</text>

  <path class="line" d="M 1145 985 L 1145 1032 L 700 1032"/>
  <path class="line" d="M 700 1032 L 700 1080"/>

  <rect class="box" x="470" y="103" rx="0" ry="0" width="0" height="0" opacity="0"/>

  <rect class="box" x="425" y="1032" rx="20" ry="20" width="550" height="88" transform="translate(0,-148)"/>
  <text x="700" y="919" text-anchor="middle" class="boxtitle">6. Instrumentacao do Programa</text>
  <text x="700" y="946" text-anchor="middle" class="boxtext">Gera modulo instrumentado com propriedades verificaveis</text>

  <path class="line" d="M 700 972 L 700 1016"/>

  <rect class="box" x="435" y="1016" rx="20" ry="20" width="530" height="88"/>
  <text x="700" y="1051" text-anchor="middle" class="boxtitle">7. Verificacao Formal com ESBMC</text>
  <text x="700" y="1078" text-anchor="middle" class="boxtext">Bounded model checking, busca por violacoes e contraexemplos</text>

  <path class="branch" d="M 250 985 L 250 1060 L 435 1060"/>

  <rect class="box" x="1015" y="1032" rx="20" ry="20" width="0" height="0" opacity="0"/>

  <rect class="box" x="300" y="110" rx="20" ry="20" width="800" height="120" transform="translate(0,1010)"/>
  <text x="700" y="1155" text-anchor="middle" class="boxtitle">8. Consolidacao Final</text>
  <text x="385" y="1185" class="result">Smell heuristico</text>
  <text x="610" y="1185" class="result">Hipotese nao confirmada</text>
  <text x="905" y="1185" class="result">Bug formalmente confirmado</text>
  <text x="1160" y="1185" text-anchor="end" class="result">Caso inconclusivo</text>
</svg>
